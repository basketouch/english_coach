<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coach English — Direcciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Hanken+Grotesk:wght@400;500;600;700&family=Schibsted+Grotesk:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; height: 100%; background: #f0eee9; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="content.js"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel" data-presets="react">
const THEMES = [
  {
    id: 'cuaderno',
    label: 'A · Cuaderno',
    dark: false,
    vars: {
      '--bg': '#F1ECE2', '--surface': '#FFFFFF', '--surface-2': '#F6F1E8',
      '--ink': '#1C1A15', '--ink-soft': '#5C564A', '--ink-mute': '#9A9384',
      '--line': 'rgba(28,26,21,0.10)',
      '--accent': '#D85A28', '--accent-ink': '#FFFFFF', '--accent-soft': '#FBE7DB',
      '--radius': '20px',
      '--font-display': "'Bricolage Grotesque', sans-serif",
      '--font-text': "'Hanken Grotesk', sans-serif",
      '--display-w': '700', '--display-ls': '-0.02em',
      '--shadow': '0 1px 2px rgba(28,26,21,0.04), 0 6px 18px rgba(28,26,21,0.05)',
      '--shadow-sm': '0 1px 2px rgba(28,26,21,0.06)',
      '--shadow-accent': '0 6px 18px rgba(216,90,40,0.28)',
      '--feature-bg': '#211E18', '--feature-border': '#211E18',
      '--feature-ink': '#F7F2E8', '--feature-soft': '#B6AE9D',

    },
  },
  {
    id: 'pista',
    label: 'B · Pista',
    dark: false,
    vars: {
      '--bg': '#F4F6F8', '--surface': '#FFFFFF', '--surface-2': '#EDF1F5',
      '--ink': '#14181E', '--ink-soft': '#57606E', '--ink-mute': '#959DA9',
      '--line': 'rgba(20,24,30,0.09)',
      '--accent': '#2B62E6', '--accent-ink': '#FFFFFF', '--accent-soft': '#E5ECFD',
      '--radius': '14px',
      '--font-display': "'Schibsted Grotesk', sans-serif",
      '--font-text': "'Schibsted Grotesk', sans-serif",
      '--display-w': '800', '--display-ls': '-0.03em',
      '--shadow': '0 1px 2px rgba(20,30,60,0.04), 0 8px 22px rgba(20,30,60,0.06)',

      '--shadow-accent': '0 8px 22px rgba(43,98,230,0.26)',

      '--feature-ink': '#14181E', '--feature-soft': '#586070',
      '--tabbar-bg': 'rgba(255,255,255,0.85)',
      '--ok': '#1B7F4B', '--ok-soft': '#E1F3E9', '--bad': '#CC3B30', '--bad-soft': '#FBE6E4',
    },
  },
  {
    id: 'noche',
    label: 'C · Noche',
    dark: true,
    vars: {
      '--bg': '#14151A', '--surface': '#1E2027', '--surface-2': '#262932',
      '--ink': '#F3F4F7', '--ink-soft': '#A6ACB8', '--ink-mute': '#6C7382',
      '--line': 'rgba(255,255,255,0.10)',
      '--accent': '#FF6B2C', '--accent-ink': '#16120C', '--accent-soft': 'rgba(255,107,44,0.16)',
      '--radius': '18px',
      '--font-display': "'Space Grotesk', sans-serif",
      '--font-text': "'Hanken Grotesk', sans-serif",

      '--shadow': '0 2px 10px rgba(0,0,0,0.40)',
      '--shadow-sm': '0 1px 3px rgba(0,0,0,0.45)',
      '--shadow-accent': '0 6px 20px rgba(255,107,44,0.30)',
      '--feature-bg': '#23262F', '--feature-border': 'rgba(255,255,255,0.10)',
      '--feature-ink': '#F3F4F7', '--feature-soft': '#A6ACB8',
      '--tabbar-bg': 'rgba(30,32,39,0.82)',
      '--ok': '#3FB07A', '--ok-soft': 'rgba(63,176,122,0.16)', '--bad': '#FF6B5C', '--bad-soft': 'rgba(255,107,92,0.16)',
    },
  },
];

function Phone({ theme }) {
  return (
    <IOSDevice dark={theme.dark} width={402} height={874}>
      <CoachApp theme={theme} />
    </IOSDevice>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="coach" title="Coach English — App de baloncesto"
        subtitle="Misma app, 3 direcciones visuales. Toca, navega y escucha el audio en cada una.">
        {THEMES.map(t => (
          <DCArtboard key={t.id} id={t.id} label={t.label} width={402} height={874}
            style={{ borderRadius: 48 }}>
            <Phone theme={t} />
          </DCArtboard>
        ))}
        <DCPostIt top={40} right={-150} rotate={2}>
          Pulsa el botón ♪ en cualquier palabra o paso para oír la pronunciación.
        </DCPostIt>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
