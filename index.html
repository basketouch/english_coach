<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>English Coach</title>
<meta name="description" content="Aprende el inglés que necesitas para dirigir entrenamientos de baloncesto." />

<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#14151A" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="English Coach" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; height: 100%; background: #14151A; overscroll-behavior: none; }
  body { -webkit-tap-highlight-color: transparent; }
  #root { height: 100dvh; width: 100%; }
  /* the real app fills the screen and respects the device safe areas */
  #root > .bb-app {
    height: 100%;
    --safe-top: calc(env(safe-area-inset-top) + 20px);
    --safe-bottom: calc(env(safe-area-inset-bottom) + 12px);
  }
  /* splash while React + Babel boot */
  #boot {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #14151A; z-index: 999; transition: opacity .4s ease;
    font-family: 'Space Grotesk', system-ui, sans-serif;
  }
  #boot.hide { opacity: 0; pointer-events: none; }
  #boot .mark { width: 76px; height: 76px; border-radius: 50%;
    background: radial-gradient(circle at 38% 34%, #FF7B3E, #FF6B2C 60%, #E2541A);
    position: relative; box-shadow: 0 10px 40px rgba(255,107,44,.4); }
  #boot .mark::before, #boot .mark::after {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    border: 2.5px solid rgba(20,18,12,.55); }
  #boot .mark::before { clip-path: inset(0 49% 0 49%); }
  #boot .mark::after { clip-path: inset(49% 0 49% 0); }
</style>
</head>
<body>
<div id="boot"><div class="mark"></div></div>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="content.js"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel" data-presets="react">
const NOCHE = {
  id: 'noche',
  dark: true,
  vars: {
    '--bg': '#14151A', '--surface': '#1E2027', '--surface-2': '#262932',
    '--ink': '#F3F4F7', '--ink-soft': '#A6ACB8', '--ink-mute': '#6C7382',
    '--line': 'rgba(255,255,255,0.10)',
    '--accent': '#FF6B2C', '--accent-ink': '#16120C', '--accent-soft': 'rgba(255,107,44,0.16)',
    '--radius': '18px',
    '--font-display': "'Space Grotesk', sans-serif",
    '--font-text': "'Hanken Grotesk', sans-serif",
    '--display-w': '600', '--display-ls': '-0.02em',
    '--shadow': '0 2px 10px rgba(0,0,0,0.40)',
    '--shadow-sm': '0 1px 3px rgba(0,0,0,0.45)',
    '--shadow-accent': '0 6px 20px rgba(255,107,44,0.30)',
    '--feature-bg': '#23262F', '--feature-border': 'rgba(255,255,255,0.10)',
    '--feature-ink': '#F3F4F7', '--feature-soft': '#A6ACB8',
    '--tabbar-bg': 'rgba(20,21,26,0.86)',
    '--ok': '#3FB07A', '--ok-soft': 'rgba(63,176,122,0.16)', '--bad': '#FF6B5C', '--bad-soft': 'rgba(255,107,92,0.16)',
  },
};

ReactDOM.createRoot(document.getElementById('root')).render(<CoachApp theme={NOCHE} />);

// hide splash once the app has mounted (timeout fires even when the tab/iframe
// is backgrounded, unlike requestAnimationFrame)
function hideBoot() {
  const b = document.getElementById('boot');
  if (b) { b.classList.add('hide'); setTimeout(() => b.remove(), 500); }
}
setTimeout(hideBoot, 60);
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
